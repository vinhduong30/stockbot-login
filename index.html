<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Bot Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #19223f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            padding: 40px 24px 32px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: 400;
        }
        
        .content {
            padding: 28px 24px 32px;
            background: white;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 20px;
            margin-bottom: 28px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #64748b;
        }
        
        .tab.active {
            background: white;
            color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        
        .form-group {
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: #f8fafc;
        }
        
        .input-wrapper input:focus {
            border-color: #2563eb;
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 16px;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.5);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
        }
        
        .info-box {
            background: #f0f9ff;
            border-radius: 20px;
            padding: 16px;
            margin-top: 24px;
            border-left: 4px solid #2563eb;
        }
        
        .info-box strong {
            color: #1e293b;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .info-box p {
            color: #475569;
            font-size: 13px;
            line-height: 1.5;
            margin: 4px 0;
        }
        
        .footer {
            text-align: center;
            padding: 20px 24px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
        
        .footer small {
            color: #64748b;
            font-size: 12px;
        }
        
        .debug-log {
            display: none;
            background: #1e293b;
            color: #a5f3fc;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>🚀 TOKYO BOT</h1>
            <p>Đăng nhập để bắt đầu</p>
        </div>
        
        <div class="content">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('kis')">🔑 KIS ID</div>
                <div class="tab" onclick="switchTab('email')">📧 Email</div>
            </div>
            
            <div id="kis-form" class="form-group">
                <label>Mã ID KIS</label>
                <div class="input-wrapper">
                    <i>🔑</i>
                    <input type="text" id="kis-id" placeholder="057Cxxxxxx" value="057C123456">
                </div>
                <p style="font-size: 12px; color: #64748b; margin-top: 6px;">Định dạng: 057C + 6 số</p>
            </div>
            
            <div id="email-form" class="form-group" style="display: none;">
                <label>Địa chỉ Email</label>
                <div class="input-wrapper">
                    <i>📧</i>
                    <input type="email" id="email" placeholder="your@email.com" value="user@example.com">
                </div>
            </div>
            
            <button class="btn-login" onclick="login()" id="login-btn">
                ĐĂNG NHẬP
            </button>
            
            <div class="info-box">
                <strong>📌 Hướng dẫn:</strong>
                <p>• Nhấn nút ĐĂNG NHẬP để gửi dữ liệu</p>
                <p>• Dữ liệu sẽ được gửi về bot</p>
                <p>• Sau đó webapp tự đóng</p>
            </div>
            
            <div class="debug-log" id="debug-log"></div>
        </div>
        
        <div class="footer">
            <small>© 2026 Tokyo Bot</small>
        </div>
    </div>

    <script>
        // Khởi tạo Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Mở rộng webapp
        tg.ready(); // Báo cho Telegram biết đã sẵn sàng
        
        console.log("🚀 WebApp đã khởi động!");
        console.log("Telegram WebApp:", tg);
        
        // Hàm ghi log debug
        function addDebugLog(message) {
            const debugLog = document.getElementById('debug-log');
            debugLog.style.display = 'block';
            debugLog.innerHTML += message + '\n';
            console.log(message);
        }
        
        // Chuyển tab
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            if (tab === 'kis') {
                event.target.classList.add('active');
                document.getElementById('kis-form').style.display = 'block';
                document.getElementById('email-form').style.display = 'none';
                addDebugLog('📋 Chuyển sang tab KIS');
            } else {
                event.target.classList.add('active');
                document.getElementById('kis-form').style.display = 'none';
                document.getElementById('email-form').style.display = 'block';
                addDebugLog('📋 Chuyển sang tab Email');
            }
        }
        
        // Xử lý đăng nhập
        function login() {
            addDebugLog('🔵 Bắt đầu đăng nhập...');
            
            const loginBtn = document.getElementById('login-btn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'ĐANG XỬ LÝ...';
            
            try {
                // Xác định tab đang active
                const activeTab = document.querySelector('.tab.active').textContent;
                addDebugLog(`📌 Tab active: ${activeTab}`);
                
                let loginData = {};
                
                if (activeTab.includes('KIS')) {
                    const kisId = document.getElementById('kis-id').value.trim();
                    addDebugLog(`📝 Giá trị KIS: ${kisId}`);
                    
                    if (!kisId) {
                        alert('Vui lòng nhập mã KIS');
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'ĐĂNG NHẬP';
                        return;
                    }
                    
                    loginData = {
                        type: 'kis',
                        value: kisId
                    };
                } else {
                    const email = document.getElementById('email').value.trim();
                    addDebugLog(`📝 Giá trị Email: ${email}`);
                    
                    if (!email || !email.includes('@')) {
                        alert('Vui lòng nhập email hợp lệ');
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'ĐĂNG NHẬP';
                        return;
                    }
                    
                    loginData = {
                        type: 'email',
                        value: email
                    };
                }
                
                // Chuyển thành JSON
                const jsonData = JSON.stringify(loginData);
                addDebugLog(`📦 Dữ liệu JSON: ${jsonData}`);
                
                // Gửi dữ liệu
                addDebugLog('📤 Đang gửi dữ liệu...');
                tg.sendData(jsonData);
                addDebugLog('✅ Đã gửi dữ liệu thành công!');
                
                // Đóng webapp
                addDebugLog('🔚 Đóng webapp...');
                setTimeout(() => {
                    tg.close();
                }, 500);
                
            } catch (error) {
                addDebugLog(`❌ LỖI: ${error.message}`);
                alert('Lỗi: ' + error.message);
                loginBtn.disabled = false;
                loginBtn.textContent = 'ĐĂNG NHẬP';
            }
        }
        
        // Xử lý nút back
        tg.onEvent('backButtonClicked', function() {
            addDebugLog('🔙 Nhấn nút back');
            tg.close();
        });
        
        // Log khi webapp sẵn sàng
        tg.onEvent('mainButtonClicked', function() {
            addDebugLog('🔘 Main button clicked');
        });
        
        addDebugLog('✅ WebApp đã sẵn sàng!');
    </script>
</body>
</html>
