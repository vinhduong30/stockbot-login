<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StockBot PRO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family:Arial;padding:30px">

<h2>📊 STOCKBOT PRO</h2>
<div id="content">Đang đăng nhập...</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const VPS = "https://YOUR_VPS_HTTPS_URL";

fetch(VPS + "/auth", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({initData:tg.initData})
})
.then(r=>r.json())
.then(data=>{
    if(data.status==="ok"){
        fetch(`${VPS}/dashboard/${data.user_id}`)
        .then(r=>r.json())
        .then(d=>{
            document.getElementById("content").innerHTML=
            `
            <b>User:</b> ${data.user_id}<br>
            <b>Role:</b> ${data.role}<br><br>
            <b>Cash:</b> ${d.cash.toLocaleString()} VNĐ<br>
            <b>DCA:</b> ${d.dca.toLocaleString()} VNĐ<br><br>
            <b>Investments:</b><br>
            <pre>${JSON.stringify(d.investments,null,2)}</pre>
            <b>Watchlist:</b><br>
            ${d.watchlist.join(", ")}
            `;
        })
    } else {
        document.getElementById("content").innerHTML="❌ Login thất bại";
    }
})
</script>

</body>
</html>
